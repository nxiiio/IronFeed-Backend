server:
  port: 8084

spring:
  output:
    ansi:
      enabled: always
  application:
    name: posts-ms
  datasource:
    url: jdbc:postgresql://localhost:5432/posts_db
    username: posts_user
    password: posts_pass
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
